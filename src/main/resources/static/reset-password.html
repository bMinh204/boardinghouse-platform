<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | Trọ Tốt ICTU</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page">
<div class="auth-shell">
    <section class="auth-card panel" style="margin: 0 auto; max-width: 480px; width: 100%;">
        <div class="auth-card-header">
            <h2>Tạo mật khẩu mới</h2>
        </div>
        <form id="resetForm" class="stack-form auth-form">
            <p class="field-hint">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
            <input id="tokenInput" type="hidden" name="token">
            <input id="emailInput" name="email" type="email" placeholder="Email">
            <input id="otpInput" name="otp" inputmode="numeric" maxlength="6" placeholder="Ma OTP">
            <input name="newPassword" type="password" placeholder="Mật khẩu mới (ít nhất 6 ký tự)" required>
            <input name="confirmPassword" type="password" placeholder="Xác nhận mật khẩu mới" required>
            <button class="primary-button" type="submit">Xác nhận thay đổi</button>
            <a href="/auth.html" class="ghost-button" style="text-align: center; display: block;">Quay lại đăng nhập</a>
        </form>
    </section>
</div>
<div id="toast" class="toast hidden"></div>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const toast = document.getElementById("toast");
        let toastTimer = null;

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.classList.remove("hidden");
            toast.style.background = isError ? "var(--toast-error-bg)" : "var(--toast-bg)";
            toast.style.color = "var(--toast-ink)";
            toast.style.border = "1px solid var(--border)";
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.add("hidden"), 3200);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        const email = urlParams.get("email");
        if (!token && !email) {
            alert("Liên kết không hợp lệ!");
            window.location.href = "/auth.html";
            return;
        }
        document.getElementById("tokenInput").value = token;
        document.getElementById("emailInput").value = email || "";
        document.getElementById("emailInput").required = !token;
        document.getElementById("otpInput").required = !token;

        const form = document.getElementById("resetForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const newPassword = form.newPassword.value;
            const confirmPassword = form.confirmPassword.value;

            if (newPassword !== confirmPassword) {
                return showToast("Mật khẩu xác nhận không khớp!", true);
            }

            try {
                const response = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, email: form.email.value, otp: form.otp.value, newPassword })
                });
                let data = {};
                try { data = await response.json(); } catch (error) { data = {}; }
                if (!response.ok) throw new Error(data.message || "Có lỗi xảy ra");
                
                showToast("Cập nhật thành công! Đang chuyển hướng...", false);
                setTimeout(() => { window.location.href = "/auth.html"; }, 2000);
            } catch (error) {
                showToast(error.message, true);
            }
        });
    });
</script>
</body>
</html>
