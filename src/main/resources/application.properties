spring.application.name=boardinghouse-platform
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/boarding_house_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jackson.serialization.write-dates-as-timestamps=false
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# --- Cấu hình gửi Email ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.frontend-url=${APP_FRONTEND_URL:http://localhost:8080}


server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=12h

app.bootstrap-admin-email=admin@trototn.vn
app.bootstrap-admin-password=admin123

# --- Cấu hình Chatbot AI ---
# local: dùng thuật toán lọc nội bộ, không cần API key
# openai: dùng OpenAI Chat Completions API nếu có OPENAI_API_KEY
# gemini: dùng Gemini generateContent API nếu có GEMINI_API_KEY
app.chatbot.provider=${CHATBOT_PROVIDER:local}
app.chatbot.openai.api-key=${OPENAI_API_KEY:}
app.chatbot.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.chatbot.gemini.api-key=${GEMINI_API_KEY:}
app.chatbot.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# --- Cấu hình Upload File ---
# local: lưu vào thư mục app.upload-dir, phù hợp chạy dev/local
# cloudinary: lưu ảnh lên Cloudinary, phù hợp Railway/online vì ảnh không mất khi redeploy
app.upload.provider=${APP_UPLOAD_PROVIDER:local}
app.upload-dir=${APP_UPLOAD_DIR:uploads/}
app.upload.public-base-url=${APP_UPLOAD_PUBLIC_BASE_URL:}
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:trototn/rooms}
# Giới hạn kích thước tối đa cho 1 file đơn lẻ (Ví dụ: 5MB)
spring.servlet.multipart.max-file-size=5MB
# Giới hạn kích thước tối đa cho toàn bộ request chứa nhiều file (Ví dụ: 20MB)
spring.servlet.multipart.max-request-size=20MB
