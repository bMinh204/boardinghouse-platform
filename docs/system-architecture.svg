<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222"/>
    </marker>
    <style>
      .title { font: 700 24px "Times New Roman", serif; fill: #111; }
      .label { font: 700 20px "Times New Roman", serif; fill: #111; }
      .text { font: 18px "Times New Roman", serif; fill: #111; }
      .small { font: 16px "Times New Roman", serif; fill: #111; }
      .box { fill: #fff; stroke: #222; stroke-width: 2; rx: 4; }
      .component { fill: #f7f7f7; stroke: #777; stroke-width: 1.5; rx: 5; }
      .line { stroke: #222; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #555; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
      .caption { font: 700 17px "Times New Roman", serif; fill: #111; }
    </style>
  </defs>

  <rect width="900" height="760" fill="#fff"/>
  <text x="450" y="38" class="title" text-anchor="middle">Kiến trúc Tổng quan Hệ thống</text>

