  <text x="637.5" y="288" class="small" text-anchor="middle">Tư vấn phòng trọ</text>

  <path d="M188 190 L300 235" class="line"/>
  <path d="M450 190 L400 235" class="line"/>
  <path d="M710 190 L475 246" class="line"/>
  <path d="M638 235 L475 270" class="line"/>

  <path d="M450 332 L450 392" class="line"/>
  <text x="470" y="365" class="caption">HTTPS / JSON</text>

  <text x="300" y="410" class="label">Backend (Server)</text>
  <rect x="285" y="418" width="330" height="220" class="box"/>

  <rect x="355" y="455" width="190" height="64" class="component"/>
