  <text x="175" y="715" class="text" text-anchor="middle">MySQL Database</text>

  <rect x="345" y="680" width="210" height="58" class="component"/>
  <text x="450" y="715" class="text" text-anchor="middle">Upload Ảnh Phòng</text>

  <rect x="620" y="680" width="210" height="58" class="component"/>
  <text x="725" y="705" class="text" text-anchor="middle">Chatbot Service</text>
